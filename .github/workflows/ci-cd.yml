name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest

      # Docker build
      - name: Build Docker images
        run: docker compose build
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/salescast-backend ./backend
    
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/salescast-frontend ./frontend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/salescast-backend
      
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/salescast-frontend
